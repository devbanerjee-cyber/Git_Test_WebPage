<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- ✅ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ✅ Firebase -->

<body>

  <!-- ✅ Shared Header -->
  <div id="header-placeholder"></div>

  <main>
    <h2>Admin Panel</h2>

    <!-- ✅ Add Button -->
    <button id="addBtn">Add New</button>

    <!-- ✅ Add Form -->
    <div id="addForm" style="display:none;">
      <input id="newTitle" placeholder="Title" required><br>
      <input id="newDesc" placeholder="Description"><br>
      <input id="newTech" placeholder="Tech"><br>
      <input id="newLink" placeholder="Link"><br>
      <button id="saveNew">Save</button>
    </div>
