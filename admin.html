<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- ✅ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ✅ Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>

<body>

  <div id="header"></div>

  <main>
    <h2>Admin Panel</h2>

    <button id="addBtn">Add New</button>

    <div id="addForm" style="display:none;">
      <input id="newTitle" placeholder="Title"><br>
      <input id="newDesc" placeholder="Description"><br>
      <input id="newTech" placeholder="Tech"><br>
      <input id="newLink" placeholder="Link"><br>
      <button id="saveNew">Save</button>
    </div>

    <hr>

    <div id="list"></div>
  </main>

  <div id="footer"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/include.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const ADMIN_EMAIL = "devbanerjee@gmail.com";

      const supabase = supabase.createClient(
        "https://jtymtovpzqrfkdhbcrxg.supabase.co",
        "sb_publishable_8ekcWHQ_-jc4wHc7jO9POQ_kPI5TEF9"
      );

      const auth = firebase.auth();

      const list = document.getElementById("list");

      // ✅ AUTH CHECK
      auth.onAuthStateChanged(user => {
        if (!user || user.email !== ADMIN_EMAIL) {
          window.location.href = "index.html";
          return;
        }
        loadData();
      });

      // ✅ LOAD
      async function loadData() {
        let { data } = await supabase.from("trainingdata").select("*");

        list.innerHTML = "";
        data.forEach(renderRow);
      }

      // ✅ RENDER
      function renderRow(row) {
        const div = document.createElement("div");

        div.innerHTML = `
          <input value="${row.title}" disabled class="title">
          <input value="${row.desc || ''}" disabled class="desc">
          <input value="${row.tech || ''}" disabled class="tech">
          <input value="${row.link || ''}" disabled class="link">

          <button class="edit">Edit</button>
          <button class="save" style="display:none">Save</button>
          <button class="delete">Delete</button>
        `;

        div.querySelector(".edit").onclick = () => {
          div.querySelectorAll("input").forEach(i => i.disabled = false);
          div.querySelector(".save").style.display = "inline";
        };

        div.querySelector(".save").onclick = async () => {
          const updated = {
            title: div.querySelector(".title").value,
            desc: div.querySelector(".desc").value,
            tech: div.querySelector(".tech").value,
            link: div.querySelector(".link").value
          };

          await supabase.from("trainingdata").update(updated).eq("id", row.id);

          div.querySelectorAll("input").forEach(i => i.disabled = true);
          div.querySelector(".save").style.display = "none";
        };

        div.querySelector(".delete").onclick = async () => {
          await supabase.from("trainingdata").delete().eq("id", row.id);
          div.remove();
        };

        list.appendChild(div);
      }

      // ✅ ADD
      document.getElementById("addBtn").onclick = () => {
        document.getElementById("addForm").style.display = "block";
      };

      document.getElementById("saveNew").onclick = async () => {
        const title = document.getElementById("newTitle").value;

        if (!title) {
          alert("Title required");
          return;
        }

        const newRow = {
          title,
          desc: document.getElementById("newDesc").value,
          tech: document.getElementById("newTech").value,
          link: document.getElementById("newLink").value
        };

        let { data } = await supabase
          .from("trainingdata")
          .insert([newRow])
          .select();

        renderRow(data[0]);

        document.getElementById("addForm").style.display = "none";
      };

    });
  </script>

</body>
</html>
